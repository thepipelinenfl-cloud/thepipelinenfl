<!DOCTYPE html>
<html>
<head>
    <title>Pipeline Application with Disclaimer</title>
    <script>
        // JavaScript to handle tab behavior
        function openTab(evt, tabName) {
            // Hide all elements with class="tabcontent"
            var tabcontent = document.getElementsByClassName("tabcontent");
            for (var i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = "none";
            }
            // Remove the class "active" from all buttons
            var tablinks = document.getElementsByClassName("tablink");
            for (var i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(" active", "");
            }
            // Show the current tab, and add an "active" class to the button that opened the tab
            document.getElementById(tabName).style.display = "block";
            evt.currentTarget.className += " active";
        }
    </script>
    <style>
        .tab {
            overflow: hidden;
            background-color: #f1f1f1;
        }
        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: 0.3s;
            font-size: 17px;
        }
        .tab button:hover {
            background-color: #ddd;
        }
        .tab button.active {
            background-color: #ccc;
        }
        .tabcontent {
            display: none;
            padding: 6px 12px;
            border: 1px solid #ccc;
            border-top: none;
        }
    </style>
</head>
<body>
    <h1>Pipeline Application</h1>
    <div class="tab">
        <button class="tablink" onclick="openTab(event, 'Disclaimer')">Disclaimer</button>
        <button class="tablink" onclick="openTab(event, 'Instructions')">Instructions</button>
        <button class="tablink" onclick="openTab(event, 'Support')">Support</button>
    </div>

    <div id="Disclaimer" class="tabcontent">
        <h3>Disclaimer</h3>
        <p>This is a disclaimer.</p>
    </div>

    <div id="Instructions" class="tabcontent">
        <h3>Instructions</h3>
        <p>Here are the instructions.</p>
    </div>

    <div id="Support" class="tabcontent">
        <h3>Support</h3>
        <p>For support, contact us.</p>
    </div>

    <script>
        // Click on the first tab to open it by default
        document.getElementsByClassName('tablink')[0].click();
    </script>
</body>
</html>
